spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: user
    password: user
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: dev
    password: dev
    virtual-host: /
server:
  port: 8080

app:
  secret-key: "dlugi_i_sekretny_klucz_do_podpisywania_tokenow"
  rabbit:
    dashboard:
      queue: "dashboard-queue"
      exchange: "dashboard-exchange"
      routing-key: "add.dashboard"
