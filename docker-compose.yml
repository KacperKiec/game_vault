services:
  user-db:
    image: postgres:17
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: user_db
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - net
    ports:
      - "5432:5432"

  game-db:
    image: postgres:17
    environment:
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game
      POSTGRES_DB: game_db
    volumes:
      - game_data:/var/lib/postgresql/data
    networks:
      - net
    ports:
      - "5433:5432"

  notification-db:
    image: postgres:17
    environment:
      POSTGRES_USER: notif
      POSTGRES_PASSWORD: notif
      POSTGRES_DB: notification_db
    volumes:
      - notification_data:/var/lib/postgresql/data
    networks:
      - net
    ports:
      - "5434:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: amqp-service
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev
    networks:
      - net


networks:
  net:
    driver: bridge

volumes:
  user_data:
  game_data:
  notification_data:
